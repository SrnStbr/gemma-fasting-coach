<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fasting Coach</title>
<style>
  /* ===== Material 3 Dark Theme — Seed Color: #4A90D9 ===== */
  :root {
    /* M3 Primary Palette */
    --md-sys-color-primary: #A4C8FF;
    --md-sys-color-on-primary: #003062;
    --md-sys-color-primary-container: #1B4780;
    --md-sys-color-on-primary-container: #D1E4FF;

    /* M3 Secondary Palette */
    --md-sys-color-secondary: #BEC6DC;
    --md-sys-color-on-secondary: #283041;
    --md-sys-color-secondary-container: #3E4759;
    --md-sys-color-on-secondary-container: #DAE2F9;

    /* M3 Tertiary Palette */
    --md-sys-color-tertiary: #D2B8EA;
    --md-sys-color-on-tertiary: #3B2255;
    --md-sys-color-tertiary-container: #523A6D;
    --md-sys-color-on-tertiary-container: #EEDBFF;

    /* M3 Error Palette */
    --md-sys-color-error: #FFB4AB;
    --md-sys-color-on-error: #690005;
    --md-sys-color-error-container: #93000A;
    --md-sys-color-on-error-container: #FFDAD6;

    /* M3 Neutral Palette (Dark) */
    --md-sys-color-background: #1B1B1F;
    --md-sys-color-on-background: #E3E2E6;
    --md-sys-color-surface: #1B1B1F;
    --md-sys-color-on-surface: #E3E2E6;
    --md-sys-color-on-surface-variant: #C3C6CF;
    --md-sys-color-surface-container-lowest: #0F0F13;
    --md-sys-color-surface-container-low: #1B1B1F;
    --md-sys-color-surface-container: #1F1F23;
    --md-sys-color-surface-container-high: #2A2A2E;
    --md-sys-color-surface-container-highest: #353539;
    --md-sys-color-outline: #8D9199;
    --md-sys-color-outline-variant: #43474F;
    --md-sys-color-inverse-surface: #E3E2E6;
    --md-sys-color-inverse-on-surface: #2B2B2F;
    --md-sys-color-inverse-primary: #1B4780;

    /* Phase Accent Colors — mapped to M3 tonal system */
    --phase-digestion: #8EC5FF;
    --phase-transition: #7DDCA0;
    --phase-fatburn: #FFB366;
    --phase-deepburn: #FF7A5C;
    --phase-goal: #FFD666;

    /* Elevation overlays (M3 uses tonal elevation, not shadows) */
    --md-sys-elevation-1: linear-gradient(0deg, rgba(255,255,255,0.05), rgba(255,255,255,0.05));
    --md-sys-elevation-2: linear-gradient(0deg, rgba(255,255,255,0.08), rgba(255,255,255,0.08));
    --md-sys-elevation-3: linear-gradient(0deg, rgba(255,255,255,0.11), rgba(255,255,255,0.11));

    /* M3 Shape Scale */
    --md-sys-shape-xs: 4px;
    --md-sys-shape-sm: 8px;
    --md-sys-shape-md: 12px;
    --md-sys-shape-lg: 16px;
    --md-sys-shape-xl: 28px;
    --md-sys-shape-full: 9999px;

    /* M3 Motion */
    --md-sys-motion-easing-standard: cubic-bezier(0.2, 0, 0, 1);
    --md-sys-motion-easing-emphasized: cubic-bezier(0.2, 0, 0, 1);
    --md-sys-motion-duration-short: 200ms;
    --md-sys-motion-duration-medium: 400ms;
    --md-sys-motion-duration-long: 600ms;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--md-sys-color-background);
    color: var(--md-sys-color-on-background);
    padding: 16px;
    max-width: 420px;
    margin: 0 auto;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Top App Bar (M3 Small) ===== */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0 8px;
  }
  .top-bar-title {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0;
    color: var(--md-sys-color-on-surface);
  }

  /* ===== M3 Circular Progress Indicator (Timer Ring) ===== */
  .timer-section {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 24px 0 20px;
    position: relative;
  }
  .timer-svg {
    transform: rotate(-90deg);
    filter: drop-shadow(0 0 12px var(--glow-color, rgba(164,200,255,0.3)));
  }
  .timer-track {
    fill: none;
    stroke: var(--md-sys-color-surface-container-highest);
    stroke-width: 10;
  }
  .timer-progress {
    fill: none;
    stroke: var(--phase-color, var(--md-sys-color-primary));
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset var(--md-sys-motion-duration-long) var(--md-sys-motion-easing-standard),
                stroke var(--md-sys-motion-duration-medium) var(--md-sys-motion-easing-standard);
  }
  .timer-inner {
    position: absolute;
    text-align: center;
  }
  .timer-elapsed {
    font-size: 40px;
    font-weight: 300; /* M3 Display Small equivalent */
    letter-spacing: -1px;
    line-height: 1.1;
    color: var(--md-sys-color-on-surface);
  }
  .timer-separator {
    font-size: 14px;
    font-weight: 500; /* M3 Label Large */
    letter-spacing: 0.1px;
    color: var(--md-sys-color-on-surface-variant);
    margin-top: 4px;
  }
  .timer-remaining {
    font-size: 16px;
    font-weight: 400; /* M3 Body Large */
    letter-spacing: 0.5px;
    color: var(--md-sys-color-on-surface-variant);
    margin-top: 6px;
  }

  /* ===== M3 Phase Progress Bar (Segmented) ===== */
  .phase-bar-container {
    padding: 0 16px;
    margin: 0 0 20px;
  }
  .phase-bar {
    display: flex;
    height: 8px;
    border-radius: var(--md-sys-shape-full);
    overflow: hidden;
    background: var(--md-sys-color-surface-container-highest);
  }
  .phase-segment {
    transition: background var(--md-sys-motion-duration-medium) var(--md-sys-motion-easing-standard),
                width var(--md-sys-motion-duration-medium) var(--md-sys-motion-easing-standard);
  }
  .phase-bar-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }
  .phase-bar-label {
    font-size: 10px; /* M3 Label Small */
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--md-sys-color-on-surface-variant);
  }
  .phase-bar-label.active {
    color: var(--phase-color, var(--md-sys-color-primary));
  }

  /* ===== M3 Card (Filled) ===== */
  .m3-card {
    background: var(--md-sys-color-surface-container-high);
    border-radius: var(--md-sys-shape-xl);
    padding: 24px;
    margin: 8px 0;
    transition: background var(--md-sys-motion-duration-short) var(--md-sys-motion-easing-standard);
  }
  .m3-card-elevated {
    background: var(--md-sys-color-surface-container-low);
    border-radius: var(--md-sys-shape-xl);
    padding: 24px;
    margin: 8px 0;
  }
  .m3-card-outlined {
    background: transparent;
    border: 1px solid var(--md-sys-color-outline-variant);
    border-radius: var(--md-sys-shape-xl);
    padding: 24px;
    margin: 8px 0;
  }

  /* ===== Phase Card ===== */
  .phase-card {
    text-align: center;
  }
  .phase-emoji {
    font-size: 32px;
  }
  .phase-name {
    font-size: 22px; /* M3 Headline Small */
    font-weight: 500;
    letter-spacing: 0;
    margin-top: 8px;
  }
  .phase-desc {
    font-size: 14px; /* M3 Body Medium */
    font-weight: 400;
    letter-spacing: 0.25px;
    color: var(--md-sys-color-on-surface-variant);
    margin-top: 8px;
    line-height: 1.5;
  }

  /* ===== Motivation Chip (M3 Assist Chip Tonal) ===== */
  .motivation-chip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 16px auto;
    padding: 8px 16px;
    border-radius: var(--md-sys-shape-sm);
    background: var(--md-sys-color-secondary-container);
    color: var(--md-sys-color-on-secondary-container);
    font-size: 14px; /* M3 Body Medium */
    font-weight: 500;
    letter-spacing: 0.1px;
    max-width: fit-content;
  }

  /* ===== M3 Filled Chip (Protocol) ===== */
  .protocol-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 6px 16px;
    border-radius: var(--md-sys-shape-sm);
    background: var(--md-sys-color-primary-container);
    color: var(--md-sys-color-on-primary-container);
    font-size: 12px; /* M3 Label Large */
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* ===== Streak (M3 Badge style) ===== */
  .streak-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 12px 0;
  }
  .streak-icon {
    font-size: 20px;
  }
  .streak-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: var(--md-sys-shape-full);
    background: var(--md-sys-color-tertiary-container);
    color: var(--md-sys-color-on-tertiary-container);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1px;
  }

  /* ===== History Dots (M3 FAB-ish) ===== */
  .history-dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .dot {
    width: 32px;
    height: 32px;
    border-radius: var(--md-sys-shape-full);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    transition: transform var(--md-sys-motion-duration-short) var(--md-sys-motion-easing-standard);
  }
  .dot:active { transform: scale(0.9); }
  .dot-goal {
    background: var(--md-sys-color-primary-container);
    color: var(--md-sys-color-on-primary-container);
  }
  .dot-partial {
    background: var(--md-sys-color-secondary-container);
    color: var(--md-sys-color-on-secondary-container);
  }
  .dot-miss {
    background: var(--md-sys-color-surface-container-highest);
    color: var(--md-sys-color-on-surface-variant);
  }

  /* ===== Summary Card ===== */
  .summary-section { text-align: center; }
  .summary-emoji { font-size: 48px; }
  .summary-title {
    font-size: 24px; /* M3 Headline Medium */
    font-weight: 400;
    letter-spacing: 0;
    margin-top: 12px;
  }
  .summary-duration {
    font-size: 48px; /* M3 Display Small */
    font-weight: 300;
    letter-spacing: -1px;
    margin-top: 12px;
  }
  .summary-subtitle {
    font-size: 14px;
    font-weight: 400;
    color: var(--md-sys-color-on-surface-variant);
    margin-top: 8px;
  }

  /* ===== M3 List Items ===== */
  .history-list {
    list-style: none;
  }
  .history-item {
    display: flex;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--md-sys-color-outline-variant);
    gap: 16px;
  }
  .history-item:last-child { border-bottom: none; }
  .hi-icon {
    font-size: 20px;
    width: 40px;
    height: 40px;
    border-radius: var(--md-sys-shape-full);
    background: var(--md-sys-color-surface-container-highest);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .hi-content { flex: 1; }
  .hi-dur {
    font-size: 16px; /* M3 Body Large */
    font-weight: 500;
    color: var(--md-sys-color-on-surface);
  }
  .hi-proto {
    font-size: 11px; /* M3 Label Small */
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--md-sys-color-primary);
    margin-left: 8px;
  }
  .hi-date {
    font-size: 12px; /* M3 Label Medium */
    font-weight: 400;
    letter-spacing: 0.25px;
    color: var(--md-sys-color-on-surface-variant);
    margin-top: 2px;
  }

  /* ===== Idle State ===== */
  .idle-container {
    text-align: center;
    padding: 48px 16px;
  }
  .idle-icon {
    width: 72px;
    height: 72px;
    border-radius: var(--md-sys-shape-xl);
    background: var(--md-sys-color-primary-container);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 36px;
  }
  .idle-title {
    font-size: 24px; /* M3 Headline Medium */
    font-weight: 400;
    letter-spacing: 0;
    color: var(--md-sys-color-on-surface);
  }
  .idle-subtitle {
    font-size: 14px; /* M3 Body Medium */
    font-weight: 400;
    color: var(--md-sys-color-on-surface-variant);
    line-height: 1.5;
    margin-top: 12px;
  }
  .idle-chips {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
  }
  .idle-chip {
    padding: 6px 16px;
    border-radius: var(--md-sys-shape-sm);
    background: var(--md-sys-color-surface-container-highest);
    color: var(--md-sys-color-on-surface-variant);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* ===== Bottom Indicator Bar ===== */
  .bottom-indicator {
    display: flex;
    justify-content: center;
    margin-top: 24px;
    padding-bottom: 8px;
  }
  .bottom-indicator-pill {
    width: 32px;
    height: 4px;
    border-radius: 2px;
    background: var(--md-sys-color-on-surface-variant);
    opacity: 0.4;
  }

  /* ===== Section Titles ===== */
  .section-title {
    font-size: 14px; /* M3 Title Small */
    font-weight: 500;
    letter-spacing: 0.1px;
    color: var(--md-sys-color-on-surface-variant);
    margin-bottom: 12px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
const STORAGE_KEY = 'fc_active';
const HISTORY_KEY = 'fc_history';

const PROTOCOLS = { '14/10': 14, '16/8': 16, '18/6': 18, 'OMAD': 23 };

const PHASES = [
  { name: 'Digestion',  emoji: '🔄', colorVar: '--phase-digestion', minPct: 0,    maxPct: 0.25, desc: 'Insulin drops. Body transitions from fed to fasted state.' },
  { name: 'Transition', emoji: '⚡', colorVar: '--phase-transition', minPct: 0.25, maxPct: 0.50, desc: 'Glycogen depleting. Fat burning begins!' },
  { name: 'Fat Burn',   emoji: '🔥', colorVar: '--phase-fatburn',   minPct: 0.50, maxPct: 0.75, desc: 'Body running on fat. Mental clarity increases.' },
  { name: 'Deep Burn',  emoji: '🦁', colorVar: '--phase-deepburn',  minPct: 0.75, maxPct: 0.94, desc: 'Autophagy begins. Cellular repair activated!' },
  { name: 'Goal!',       emoji: '🎉', colorVar: '--phase-goal',       minPct: 0.94, maxPct: Infinity, desc: 'Protocol target reached! Full autophagy!' }
];

const PHASE_CSS_COLORS = {
  '--phase-digestion': '#8EC5FF',
  '--phase-transition': '#7DDCA0',
  '--phase-fatburn': '#FFB366',
  '--phase-deepburn': '#FF7A5C',
  '--phase-goal': '#FFD666'
};

const MOTIVATIONS = {
  'Digestion': ['Every hour counts. 💪', 'The journey starts now.', 'Trust the process! 🌱'],
  'Transition': ['Fat burning is kicking in! 🔥', 'You are entering the zone!', 'Almost there — the best is yet to come!'],
  'Fat Burn': ['Your body is literally burning fat! 🔥', 'Clarity mode: ON.', 'Fat is fuel. You are the engine. ⚡'],
  'Deep Burn': ['Autophagy! Cells are being repaired! 🦁', 'Elite discipline!', 'Maximum fat oxidation. You are a beast! 🔥'],
  'Goal!': ['You did it! Incredible! 🎉', 'Target reached! Absolute champion! ✨', 'That is elite-level fasting! 🏆']
};

function getPhase(elapsedMs, targetMs) {
  const pct = Math.min(elapsedMs / targetMs, 1);
  for (const p of PHASES) {
    if (pct >= p.minPct && pct < p.maxPct) return p;
  }
  return PHASES[PHASES.length - 1];
}

function getMotivation(name) {
  const m = MOTIVATIONS[name] || ['Keep going!'];
  return m[Math.floor(Math.random() * m.length)];
}

function getPhaseColor(phase) {
  return PHASE_CSS_COLORS[phase.colorVar] || '#A4C8FF';
}

function fmtDur(ms) {
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return `${m}m`;
  return m === 0 ? `${h}h` : `${h}h ${m}m`;
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getStreak(history) {
  if (!history || history.length === 0) return 0;
  const sorted = [...history].sort((a, b) => b.endTime - a.endTime);
  const today = new Date(); today.setHours(0,0,0,0);
  let streak = 0, checkDay = today.getTime();
  for (let i = 0; i < 90; i++) {
    const dayStr = new Date(checkDay).toISOString().split('T')[0];
    if (sorted.find(f => f.date === dayStr && f.goalReached)) {
      streak++;
    } else if (i > 0) break;
    checkDay -= 86400000;
  }
  return streak;
}

// ============================================================
// RENDER VIEWS
// ============================================================

function renderStatus() {
  const active = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  if (!active) { renderIdle(); return; }
  const protocol = active.protocol || '16/8';
  const targetHours = PROTOCOLS[protocol] || 16;
  const startTime = active.startTime;
  const targetTime = startTime + (targetHours * 3600000);

  function update() {
    const now = Date.now();
    const elapsed = now - startTime;
    const remaining = targetTime - now;
    const totalTarget = targetTime - startTime;
    const progress = Math.min(elapsed / totalTarget, 1);
    const phase = getPhase(elapsed, totalTarget);
    const phaseColor = getPhaseColor(phase);

    const r = 88, circ = 2 * Math.PI * r;
    const offset = circ * (1 - progress);

    let html = '';

    // Top bar
    html += `<div class="top-bar"><div class="top-bar-title">🦁 Fasting Coach</div></div>`;

    // Timer Ring — M3 style with glow
    html += `<div class="timer-section">
      <svg class="timer-svg" width="220" height="220" style="--glow-color: ${phaseColor}44">
        <circle class="timer-track" cx="110" cy="110" r="${r}"/>
        <circle class="timer-progress" cx="110" cy="110" r="${r}"
          stroke="${phaseColor}"
          stroke-dasharray="${circ}"
          stroke-dashoffset="${offset}"
          style="--phase-color: ${phaseColor}"/>
      </svg>
      <div class="timer-inner">
        <div class="timer-elapsed">${fmtDur(elapsed)}</div>
        <div class="timer-separator">elapsed</div>
        ${remaining > 0
          ? `<div class="timer-remaining">${fmtDur(remaining)} remaining</div>`
          : `<div class="timer-remaining" style="color: var(--phase-goal)">Target reached ✨</div>`
        }
      </div>
    </div>`;

    // Phase Progress Bar + Labels
    html += `<div class="phase-bar-container"><div class="phase-bar">`;
    for (const p of PHASES) {
      const w = p.maxPct === Infinity ? 6 : (p.maxPct - p.minPct) * 100;
      const isActive = progress >= p.minPct;
      const c = isActive ? getPhaseColor(p) : 'transparent';
      html += `<div class="phase-segment" style="width:${w}%;background:${c}"></div>`;
    }
    html += `</div><div class="phase-bar-labels">`;
    for (const p of PHASES.slice(0, -1)) {
      const isActive = progress >= p.minPct;
      html += `<span class="phase-bar-label ${isActive ? 'active' : ''}" style="${isActive ? 'color:' + getPhaseColor(p) : ''}">${p.emoji}</span>`;
    }
    html += `</div></div>`;

    // Phase Card (M3 Filled)
    html += `<div class="m3-card phase-card" style="--phase-color: ${phaseColor}">
      <div class="phase-emoji">${phase.emoji}</div>
      <div class="phase-name" style="color: ${phaseColor}">${phase.name}</div>
      <div class="phase-desc">${phase.desc}</div>
    </div>`;

    // Motivation Chip (M3 Tonal)
    html += `<div class="motivation-chip">💡 ${getMotivation(phase.name)}</div>`;

    // Protocol Chip
    html += `<div style="text-align:center;margin-top:4px"><span class="protocol-chip">${protocol}</span></div>`;

    // Bottom indicator
    html += `<div class="bottom-indicator"><div class="bottom-indicator-pill"></div></div>`;

    document.getElementById('app').innerHTML = html;
  }

  update();
  setInterval(update, 30000);
}

function renderSummary(durationMs, goalReached) {
  const emoji = goalReached ? '🎉' : '💪';
  const title = goalReached ? 'Goal Reached!' : 'Fast Complete';
  const subtitle = goalReached ? 'Incredible discipline!' : 'Every fast counts!';
  const accentColor = goalReached ? 'var(--phase-goal)' : 'var(--phase-fatburn)';
  const streak = getStreak(JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'));

  let html = '';

  html += `<div class="top-bar"><div class="top-bar-title">🦁 Fasting Coach</div></div>`;

  html += `<div class="m3-card summary-section">
    <div class="summary-emoji">${emoji}</div>
    <div class="summary-title">${title}</div>
    <div class="summary-duration" style="color: ${accentColor}">${fmtDur(durationMs)}</div>
    <div class="summary-subtitle">${subtitle}</div>`;

  if (streak > 1) {
    html += `<div class="streak-row" style="margin-top:16px">
      <span class="streak-badge">🔥 ${streak}-day streak</span>
    </div>`;
  }
  html += `</div>`;

  html += `<div class="bottom-indicator"><div class="bottom-indicator-pill"></div></div>`;

  document.getElementById('app').innerHTML = html;
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const streak = getStreak(history);
  const recent = [...history].sort((a, b) => b.endTime - a.endTime).slice(0, 7);

  let html = '';

  html += `<div class="top-bar"><div class="top-bar-title">🦁 Fasting Coach</div></div>`;

  // Section title
  html += `<div class="section-title">Fasting History</div>`;

  // Streak badge
  if (streak > 0) {
    html += `<div class="streak-row">
      <span class="streak-badge">🔥 ${streak}-day streak</span>
    </div>`;
  }

  // Last 7 dots
  if (recent.length > 0) {
    html += `<div class="history-dots">`;
    recent.forEach(f => {
      const cls = f.goalReached ? 'dot-goal' : 'dot-partial';
      html += `<div class="dot ${cls}" title="${f.date}">${f.goalReached ? '✓' : fmtDur(f.durationMinutes * 60000)}</div>`;
    });
    html += `</div>`;
  }

  // History list with M3 list items
  html += `<div class="m3-card-elevated" style="padding:8px 24px"><ul class="history-list">`;
  if (recent.length === 0) {
    html += `<div style="text-align:center;color:var(--md-sys-color-on-surface-variant);padding:24px;font-size:14px">No fasts yet. Start your first one!</div>`;
  }
  recent.forEach(f => {
    const iconEmoji = f.goalReached ? '✅' : '💪';
    const proto = f.protocol || '16/8';
    html += `<li class="history-item">
      <div class="hi-icon">${iconEmoji}</div>
      <div class="hi-content">
        <div><span class="hi-dur">${fmtDur(f.durationMinutes * 60000)}</span><span class="hi-proto">${proto}</span></div>
        <div class="hi-date">${f.date}</div>
      </div>
    </li>`;
  });
  html += `</ul></div>`;

  html += `<div class="bottom-indicator"><div class="bottom-indicator-pill"></div></div>`;

  document.getElementById('app').innerHTML = html;
}

function renderIdle() {
  document.getElementById('app').innerHTML = `
    <div class="top-bar"><div class="top-bar-title">🦁 Fasting Coach</div></div>
    <div class="idle-container">
      <div class="idle-icon">🦁</div>
      <div class="idle-title">Ready to fast?</div>
      <div class="idle-subtitle">Say <strong>"start fasting"</strong> to begin.<br>
      Choose your protocol below:</div>
      <div class="idle-chips">
        <span class="idle-chip">14/10</span>
        <span class="idle-chip">16/8</span>
        <span class="idle-chip">18/6</span>
        <span class="idle-chip">OMAD</span>
      </div>
    </div>
    <div class="bottom-indicator"><div class="bottom-indicator-pill"></div></div>`;
}

// ============================================================
// ROUTING
// ============================================================

const params = new URLSearchParams(window.location.search);
const action = params.get('action') || 'status';

switch (action) {
  case 'status':
    renderStatus();
    break;
  case 'summary': {
    const dur = parseInt(params.get('dur') || '0');
    const goal = params.get('goal') === 'true';
    renderSummary(dur, goal);
    break;
  }
  case 'history':
    renderHistory();
    break;
  case 'idle':
  default:
    renderIdle();
}
</script>

</body>
</html>
